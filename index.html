<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>FitCoach Pro</title>
    <meta name="description" content="A plataforma de coaching fitness mais elegante e intuitiva." />

    <!-- PWA Setup -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FitCoach" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Fonts: Outfit (Display) + DM Sans (Body) - Memorable & Refined -->
    <!-- Optimized Font Loading: Only specific weights to avoid large payloads -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet" />

    <!-- Optimized Material Symbols: Using block display for icons to avoid text fallback -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
        rel="stylesheet" />

    <script>
        window.addEventListener('error', function (e) {
            document.body.innerHTML += '<div style="color:red; padding:20px; font-family:monospace; background:white; position:fixed; top:0; left:0; width:100%; z-index:9999; border-bottom:2px solid red;">' +
                '<strong>Global Error:</strong> ' + e.message +
                '<br/><small>' + e.filename + ':' + e.lineno + '</small>' +
                '</div>';
            console.error('Global Error Caught:', e);
        });

        // Force disable zoom on mobile (iOS Safari ignores the meta tag)
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            let now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        document.addEventListener('gesturestart', function (event) {
            event.preventDefault();
        });
    </script>
    <!-- Tailwind CSS (Local Build) -->
    <!-- Configuration moved to tailwind.config.js and styles to index.css -->
    <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0"
  }
}
</script>
    <link rel="stylesheet" href="/index.css">
</head>

<body class="antialiased transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
